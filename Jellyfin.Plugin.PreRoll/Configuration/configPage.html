<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Pre-Roll Videos</title>
    <style>
        .preroll-page { max-width: 820px; padding: 1.5em; font-family: inherit; }
        .preroll-section { background: rgba(255,255,255,0.04); border-radius: 8px; padding: 1.2em 1.4em; margin-bottom: 1.4em; }
        .preroll-section h2 { margin: 0 0 0.8em 0; font-size: 1.05em; font-weight: 600; color: rgba(255,255,255,0.9); border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 0.4em; }
        .preroll-toggle-row { display: flex; align-items: center; gap: 0.75em; margin-bottom: 0.6em; }
        .preroll-toggle-row label { cursor: pointer; font-size: 0.95em; color: rgba(255,255,255,0.82); }
        .preroll-library-grid { display: flex; flex-wrap: wrap; gap: 0.65em; margin-top: 0.6em; }
        .preroll-lib-card { display: flex; align-items: center; gap: 0.5em; padding: 0.5em 0.85em; border-radius: 6px; background: rgba(255,255,255,0.07); cursor: pointer; border: 1.5px solid transparent; transition: border-color 0.15s, background 0.15s; font-size: 0.88em; color: rgba(255,255,255,0.78); user-select: none; }
        .preroll-lib-card:hover { background: rgba(255,255,255,0.12); }
        .preroll-lib-card.selected { border-color: #00a4dc; background: rgba(0,164,220,0.14); color: #fff; }
        .preroll-lib-card input[type="checkbox"] { accent-color: #00a4dc; width: 15px; height: 15px; cursor: pointer; pointer-events: none; }
        .preroll-type-tag { font-size: 0.75em; opacity: 0.55; margin-left: 0.2em; }
        .preroll-actions { display: flex; gap: 0.75em; margin-top: 1.6em; }
        .preroll-btn { padding: 0.55em 1.4em; border-radius: 5px; font-size: 0.9em; font-weight: 600; cursor: pointer; border: none; transition: opacity 0.15s; }
        .preroll-btn:hover { opacity: 0.85; }
        .preroll-btn-primary { background: #00a4dc; color: #fff; }
        .preroll-btn-secondary { background: rgba(255,255,255,0.1); color: rgba(255,255,255,0.85); }
        .preroll-status { margin-top: 0.9em; padding: 0.6em 1em; border-radius: 5px; font-size: 0.88em; display: none; }
        .preroll-status.success { background: rgba(0,200,100,0.15); color: #4cde92; display: block; }
        .preroll-status.error { background: rgba(220,50,50,0.15); color: #f47979; display: block; }
        .preroll-hint { font-size: 0.8em; color: rgba(255,255,255,0.45); margin-top: 0.35em; }
        .preroll-empty { font-size: 0.88em; color: rgba(255,255,255,0.4); padding: 0.4em 0; }
    </style>
</head>
<body>
<div id="PreRollConfigPage" data-role="page" class="page librarySettingsPage">
    <div data-role="content">
        <div class="content-primary">
            <div class="preroll-page">

                <div class="preroll-section">
                    <h2>📽️ Pre-Roll Source Library</h2>
                    <p class="preroll-hint">Add your pre-roll videos folder as a <strong>Videos</strong> library in Jellyfin, then select it here.</p>
                    <div id="preRollSourceGrid" class="preroll-library-grid">
                        <span class="preroll-empty">Loading libraries…</span>
                    </div>
                </div>

                <div class="preroll-section">
                    <h2>🎬 Play Pre-Rolls Before…</h2>
                    <div class="preroll-toggle-row">
                        <input type="checkbox" id="chkMovies" />
                        <label for="chkMovies">Movies</label>
                    </div>
                    <div class="preroll-toggle-row">
                        <input type="checkbox" id="chkTvShows" />
                        <label for="chkTvShows">TV Episodes</label>
                    </div>
                </div>

                <div class="preroll-section">
                    <h2>📚 Apply To…</h2>
                    <div class="preroll-toggle-row">
                        <input type="checkbox" id="chkAllLibraries" />
                        <label for="chkAllLibraries">All content libraries</label>
                    </div>
                    <div id="targetLibrarySection" style="margin-top:0.8em;">
                        <p class="preroll-hint">Or pick specific libraries:</p>
                        <div id="preRollTargetGrid" class="preroll-library-grid">
                            <span class="preroll-empty">Loading…</span>
                        </div>
                    </div>
                </div>

                <div class="preroll-actions">
                    <button class="preroll-btn preroll-btn-primary" id="btnSave">Save Settings</button>
                    <button class="preroll-btn preroll-btn-secondary" id="btnReset">Reset to Defaults</button>
                </div>
                <div id="statusBanner" class="preroll-status"></div>

            </div>
        </div>
    </div>
</div>

<script type="text/javascript">
(function () {
    'use strict';

    var PLUGIN_ID = 'a4b2c3d4-e5f6-7890-abcd-ef1234567891';
    var allLibraries = [];
    var selectedSourceIds = [];
    var selectedTargetIds = [];

    // ----------------------------------------------------------------
    // Auth helpers — reads token from localStorage if ApiClient is
    // not yet available (common in Jellyfin 10.11 iframe config pages)
    // ----------------------------------------------------------------
    function getServerUrl() {
        try {
            if (window.ApiClient) return window.ApiClient.serverAddress();
        } catch (e) { /* ignore */ }
        try {
            var raw = localStorage.getItem('jellyfin_credentials');
            if (raw) {
                var creds = JSON.parse(raw);
                var s = creds.Servers && creds.Servers[0];
                if (s && s.ManualAddress) return s.ManualAddress;
            }
        } catch (e) { /* ignore */ }
        return window.location.origin;
    }

    function getToken() {
        try {
            if (window.ApiClient) {
                var t = window.ApiClient.accessToken();
                if (t) return t;
            }
        } catch (e) { /* ignore */ }
        try {
            var raw = localStorage.getItem('jellyfin_credentials');
            if (raw) {
                var creds = JSON.parse(raw);
                var s = creds.Servers && creds.Servers[0];
                if (s && s.AccessToken) return s.AccessToken;
            }
        } catch (e) { /* ignore */ }
        return null;
    }

    function authHeaders() {
        var token = getToken();
        var headers = { 'Content-Type': 'application/json' };
        if (token) headers['Authorization'] = 'MediaBrowser Token="' + token + '"';
        return headers;
    }

    function apiUrl(path) {
        return getServerUrl() + path;
    }

    // ----------------------------------------------------------------
    // UI helpers
    // ----------------------------------------------------------------
    function showStatus(msg, type) {
        var el = document.getElementById('statusBanner');
        el.textContent = msg;
        el.className = 'preroll-status ' + type;
        setTimeout(function () { el.className = 'preroll-status'; }, 4500);
    }

    function toggleInArray(arr, id, add) {
        var idx = arr.indexOf(id);
        if (add && idx === -1) arr.push(id);
        if (!add && idx !== -1) arr.splice(idx, 1);
    }

    function renderGrid(containerId, libraries, selectedIds, onToggle) {
        var container = document.getElementById(containerId);
        if (!container) return;
        if (!libraries || libraries.length === 0) {
            container.innerHTML = '<span class="preroll-empty">No libraries found.</span>';
            return;
        }
        container.innerHTML = '';
        libraries.forEach(function (lib) {
            var isSelected = selectedIds.indexOf(lib.id) !== -1;
            var card = document.createElement('label');
            card.className = 'preroll-lib-card' + (isSelected ? ' selected' : '');
            var cb = document.createElement('input');
            cb.type = 'checkbox';
            cb.checked = isSelected;
            cb.addEventListener('change', function () {
                onToggle(lib.id, cb.checked);
                card.classList.toggle('selected', cb.checked);
            });
            var name = document.createElement('span');
            name.textContent = lib.name;
            var tag = document.createElement('span');
            tag.className = 'preroll-type-tag';
            tag.textContent = lib.collectionType || '';
            card.appendChild(cb);
            card.appendChild(name);
            card.appendChild(tag);
            container.appendChild(card);
        });
    }

    function syncTargetVisibility() {
        var allChecked = document.getElementById('chkAllLibraries').checked;
        document.getElementById('targetLibrarySection').style.display = allChecked ? 'none' : '';
    }

    // ----------------------------------------------------------------
    // API calls
    // ----------------------------------------------------------------
    function loadLibraries(config) {
        console.log('[PreRoll] Fetching libraries from', apiUrl('/Library/VirtualFolders'));
        fetch(apiUrl('/Library/VirtualFolders'), { headers: authHeaders() })
            .then(function (r) {
                console.log('[PreRoll] Libraries response status:', r.status);
                if (!r.ok) throw new Error('HTTP ' + r.status);
                return r.json();
            })
            .then(function (libs) {
                console.log('[PreRoll] Libraries loaded:', libs.length, libs[0]);
                // Jellyfin's /Library/VirtualFolders returns ItemId, Name, CollectionType
                // Normalize to lowercase id/name/collectionType for our render function
                allLibraries = libs.map(function (f) {
                    return {
                        id: f.ItemId || f.itemId || f.id || '',
                        name: f.Name || f.name || '',
                        collectionType: f.CollectionType || f.collectionType || ''
                    };
                });
                selectedSourceIds = (config.preRollLibraryIds || []).slice();
                selectedTargetIds = (config.targetLibraryIds || []).slice();
                renderGrid('preRollSourceGrid', libs, selectedSourceIds, function (id, add) {
                    toggleInArray(selectedSourceIds, id, add);
                });
                renderGrid('preRollTargetGrid', libs, selectedTargetIds, function (id, add) {
                    toggleInArray(selectedTargetIds, id, add);
                });
            })
            .catch(function (err) {
                console.error('[PreRoll] Failed to load libraries:', err);
                document.getElementById('preRollSourceGrid').innerHTML =
                    '<span class="preroll-empty" style="color:#f47979">Failed to load libraries (see browser console). Error: ' + err.message + '</span>';
            });
    }

    function loadConfig() {
        console.log('[PreRoll] Loading config, token present:', !!getToken(), 'server:', getServerUrl());
        fetch(apiUrl('/plugins/' + PLUGIN_ID + '/configuration'), { headers: authHeaders() })
            .then(function (r) {
                console.log('[PreRoll] Config response status:', r.status);
                if (!r.ok) throw new Error('HTTP ' + r.status);
                return r.json();
            })
            .then(function (config) {
                console.log('[PreRoll] Config loaded:', JSON.stringify(config));
                document.getElementById('chkMovies').checked = config.enableForMovies !== false;
                document.getElementById('chkTvShows').checked = config.enableForTvShows !== false;
                document.getElementById('chkAllLibraries').checked = config.enableForAllLibraries !== false;
                syncTargetVisibility();
                loadLibraries(config);
            })
            .catch(function (err) {
                console.warn('[PreRoll] Config load failed, using defaults:', err);
                document.getElementById('chkMovies').checked = true;
                document.getElementById('chkTvShows').checked = true;
                document.getElementById('chkAllLibraries').checked = true;
                syncTargetVisibility();
                loadLibraries({});
            });
    }

    function saveConfig() {
        var payload = {
            preRollLibraryIds: selectedSourceIds,
            enableForMovies: document.getElementById('chkMovies').checked,
            enableForTvShows: document.getElementById('chkTvShows').checked,
            enableForAllLibraries: document.getElementById('chkAllLibraries').checked,
            targetLibraryIds: document.getElementById('chkAllLibraries').checked ? [] : selectedTargetIds
        };
        console.log('[PreRoll] Saving config:', JSON.stringify(payload));
        fetch(apiUrl('/plugins/' + PLUGIN_ID + '/configuration'), {
            method: 'POST',
            headers: authHeaders(),
            body: JSON.stringify(payload)
        })
            .then(function (r) {
                if (r.ok) {
                    showStatus('✅ Settings saved successfully.', 'success');
                } else {
                    throw new Error('HTTP ' + r.status);
                }
            })
            .catch(function (err) {
                console.error('[PreRoll] Save failed:', err);
                showStatus('❌ Failed to save. Check the Jellyfin logs. Error: ' + err.message, 'error');
            });
    }

    function resetConfig() {
        selectedSourceIds = [];
        selectedTargetIds = [];
        document.getElementById('chkMovies').checked = true;
        document.getElementById('chkTvShows').checked = true;
        document.getElementById('chkAllLibraries').checked = true;
        syncTargetVisibility();
        renderGrid('preRollSourceGrid', allLibraries, selectedSourceIds, function (id, add) { toggleInArray(selectedSourceIds, id, add); });
        renderGrid('preRollTargetGrid', allLibraries, selectedTargetIds, function (id, add) { toggleInArray(selectedTargetIds, id, add); });
        showStatus('Settings reset. Click Save to apply.', 'success');
    }

    // ----------------------------------------------------------------
    // Init — runs once, wired up multiple ways to handle Jellyfin's
    // iframe / React dashboard loading patterns
    // ----------------------------------------------------------------
    var _initialized = false;
    function init() {
        if (_initialized) return;
        _initialized = true;
        console.log('[PreRoll] Config page initializing');
        document.getElementById('btnSave').addEventListener('click', saveConfig);
        document.getElementById('btnReset').addEventListener('click', resetConfig);
        document.getElementById('chkAllLibraries').addEventListener('change', syncTargetVisibility);
        loadConfig();
    }

    // Pattern 1: Jellyfin React dashboard fires 'viewshow' on the page div
    document.addEventListener('viewshow', function (e) {
        if (e && e.detail && e.detail.type === 'PreRollConfigPage') init();
        if (e && e.target && e.target.id === 'PreRollConfigPage') init();
    });

    // Pattern 2: Direct DOM ready (works when loaded in iframe)
    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', init);
    } else {
        // Already loaded — fire immediately (short delay for ApiClient to settle)
        setTimeout(init, 150);
    }

    // Pattern 3: Last-resort fallback in case nothing else fires
    setTimeout(init, 1500);

}());
</script>
</body>
</html>
