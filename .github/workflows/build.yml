name: Build and Release Plugin

on:
  push:
    branches: [ main ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main ]

jobs:
  build:
    name: Build Plugin
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Restore NuGet packages
        run: dotnet restore Jellyfin.Plugin.PreRoll/Jellyfin.Plugin.PreRoll.csproj

      - name: Build (Release)
        run: |
          dotnet build Jellyfin.Plugin.PreRoll/Jellyfin.Plugin.PreRoll.csproj \
            --configuration Release \
            --no-restore

      - name: Publish
        run: |
          dotnet publish Jellyfin.Plugin.PreRoll/Jellyfin.Plugin.PreRoll.csproj \
            --configuration Release \
            --no-build \
            --output ./publish

      - name: Create plugin zip
        run: |
          cd publish
          zip -j ../jellyfin-plugin-preroll.zip Jellyfin.Plugin.PreRoll.dll

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: jellyfin-plugin-preroll
          path: jellyfin-plugin-preroll.zip
          retention-days: 30

      - name: Get tag version
        if: startsWith(github.ref, 'refs/tags/')
        id: get_version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Compute MD5 checksum
        if: startsWith(github.ref, 'refs/tags/')
        id: checksum
        run: echo "MD5=$(md5sum jellyfin-plugin-preroll.zip | awk '{print $1}')" >> $GITHUB_OUTPUT

      - name: Update manifest.json
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          VERSION="${{ steps.get_version.outputs.VERSION }}"
          MD5="${{ steps.checksum.outputs.MD5 }}"
          TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          SOURCE_URL="https://github.com/${{ github.repository }}/releases/download/v${VERSION}/jellyfin-plugin-preroll.zip"

          python3 - <<EOF
          import json, sys

          with open('manifest.json', 'r') as f:
              manifest = json.load(f)

          new_version = {
              "version": "${VERSION}",
              "changelog": "See https://github.com/${{ github.repository }}/releases/tag/v${VERSION}",
              "targetAbi": "10.11.0.0",
              "sourceUrl": "${SOURCE_URL}",
              "checksum": "${MD5}",
              "timestamp": "${TIMESTAMP}"
          }

          manifest[0]["versions"].insert(0, new_version)

          with open('manifest.json', 'w') as f:
              json.dump(manifest, f, indent=2)

          print("manifest.json updated with version ${VERSION}")
          EOF

      - name: Commit updated manifest
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          git checkout main
          git add manifest.json
          git diff --cached --quiet || git commit -m "chore: update manifest for v${{ steps.get_version.outputs.VERSION }} [skip ci]"
          git push origin main

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: jellyfin-plugin-preroll.zip
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
